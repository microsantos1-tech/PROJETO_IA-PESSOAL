<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYA</title>
</head>
<body>
    <center><h1>Olá, seja Bem Vindo! Sou NYA</h1></center>
    <form action="/perguntar" method="post">
        <center>
            <textarea name="pergunta"
                placeholder="Digite aqui sua pergunta..."
                rows="2"
                cols="50">
            </textarea>
        </center>
        <br><br>
        <center><button type="submit">Enviar</button></center>
    </form>
    {% if resposta %}
    <br>
    <center>
        <div style="width: 50%; text-align: left;">
            <h3>Resposta:</h3>
            <p>{{ resposta }}</p>
        </div>
    </center>
    {% endif %}
</body>
</html>
